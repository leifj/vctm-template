# TS11 Schema Metadata for TEMPLATE
#
# This file declares the TS11 properties that cannot be automatically inferred
# from the credential definition. Place it alongside your .md file with a
# matching name: <slug>.schema-meta.yaml
#
# Only two fields are required:

attestation_los: iso_18045_basic     # Required. One of:
                                     #   iso_18045_high
                                     #   iso_18045_moderate
                                     #   iso_18045_enhanced-basic
                                     #   iso_18045_basic
                                     # Friendly aliases (high, moderate, basic, low) also work.

binding_type: key                    # Required. One of:
                                     #   key        — cryptographic key binding (cnf)
                                     #   biometric  — biometric binding
                                     #   claim      — claim-based binding
                                     #   none       — no holder binding

# --- Everything below is optional ---

# version: "1.0"                     # Schema version. Default: "0.1.0"

# rulebook_uri: https://example.com/rulebook
#   Link to the attestation rulebook. If your repository contains a
#   rulebook.md file, the registry will render it automatically but
#   you still need to set this URI if you want it in the TS11 API output.

# trusted_authorities:               # Trust framework references (TS11 §4.3.3)
#   - framework_type: etsi_tl        # Framework type identifier
#     value: https://example.com/tl   # Trust list or authority endpoint
#     is_lote: false                  # Whether this is a List of Trusted Entities

# --- Auto-generated fields (do NOT set these) ---
#
# The following fields are inferred automatically by registry-cli and should
# not be specified in this file:
#
#   id                 — UUID v5 derived from the registry base URL + org/slug
#   supportedFormats   — detected from files present: .vctm.json → dc+sd-jwt,
#                        .mdoc.json → mso_mdoc, .vc.json → jwt_vc_json
#   schemaURIs         — generated from supportedFormats + the registry base URL
