name: Update VCTM

# Disabled: registry-cli now handles credential discovery centrally.
# The vctm branch is maintained directly. To regenerate, run manually.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: sirosfoundation/mtcvctm@v1
        with:
          input-dir: ./credentials
          output-dir: ./vctm
          base-url: https://raw.githubusercontent.com/${{ github.repository }}/vctm
          vctm-branch: vctm
          commit-message: "Update credential metadata files [skip ci]"
          formats: all
          normalize: true
          verbose-rules: true
